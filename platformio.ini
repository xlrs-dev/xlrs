; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[env:rx_sx128x]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
lib_ldf_mode=deep+
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.4.0
    fastled/FastLED@^3.6.0
build_flags =
    -DRX_SIDE=1
    -DSX128X_SPI_SCK=18
    -DSX128X_SPI_MOSI=19
    -DSX128X_SPI_MISO=16
    -DSX128X_SPI_CS=17
    -DSX128X_SPI_BUSY=20
    -DSX128X_SPI_DIO1=21
    -DSX128X_SPI_RST=22
    -DSX128X_RXEN=14
    -DSX128X_TXEN=15
    ; Auto pairing timeout (seconds). 0 = disabled. Max 120.
    -DAUTO_PAIR_TIMEOUT_SEC=5
    ; Override default binding phrase (optional):
    -DDEFAULT_BINDING_PHRASE=\"Kikobot-02\"
build_src_filter = +<rx_main_sx128x.cpp> -<main.cpp> -<rx_main.cpp> -<rx_main_ppm.cpp> -<rc_crsf_main.cpp>

