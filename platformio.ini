[env:rc-crsf]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
monitor_speed = 115200
framework = arduino
board_build.core = earlephilhower
board_build.arduino.earlephilhower.usb_product = Dhanush RC
lib_deps = 
    adafruit/Adafruit SH110X@^2.1.14
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ADS1X15@^2.2.3
build_flags = 
    -DRC_CRSF_SIDE=1
    ; Match ExpressLRS TX module handset UART defaults (often 400k for ≤250 Hz Lua rate; watchdog falls back here).
    ; Set 921600 in build_flags only when the module Lua “Packet Rate” / baud pairing allows ≥921k handset (see ELRS docs).
    -DRC_TX_MODULE_UART_BAUD=400000
    ; ELRS caps handset RC frame rate ≈500 Hz at 400000 baud (~2000 µs min between frames).
    -DRC_CRSF_SIMPLETX_FRAME_US=4000u
    ; Optional: force UART inversion if your wiring uses an inverted CRSF path (try if RX shows garbage).
    ; -DRC_TX_MODULE_UART_INVERT=1
    ; Optional: skip multi-baud/invert probe for faster deterministic boot (uses RC_TX_MODULE_UART_BAUD + invert flag only).
    ; -DRC_CRSF_DISABLE_UART_PROBE=1
build_src_filter = +<rc_crsf_main.cpp> +<bq2562x.cpp> -<main.cpp> -<tx_main.cpp> -<tx_main_bt.cpp> -<tx_main_ble.cpp> -<tx_main_test.cpp> -<tx_main_sx128x.cpp> -<rx_main_sx128x.cpp> -<rx_main_ble.cpp> -<blink.cpp> -<sx1280_debug.cpp>

[env:rc-rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
monitor_speed = 115200
framework = arduino
board_build.core = earlephilhower
board_build.arduino.earlephilhower.usb_product = Dhanush RC
lib_deps = 
    adafruit/Adafruit SH110X@^2.1.14
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ADS1X15@^2.2.3
build_flags = 
    -DRC_CRSF_SIDE=1
    -DINTERNAL_ADC=1
    -DCRSF_CORE1_CHANNELS=1
    -DRC_STICK_ADC_12BIT=1
    ; Without this, boot needs GP22 (QON) held LOW ~5s; USB/no-button often reads HIGH → instant deep sleep.
    -DRC_SKIP_POWER_ON_SEQUENCE=1
    ; Handset ↔ ELRS module UART — see rc-crsf comments (400000 default; bump if Lua baud is ≥921600).
    -DRC_TX_MODULE_UART_BAUD=400000
    -DRC_CRSF_SIMPLETX_FRAME_US=4000u
    ; Optional UART: -DRC_TX_MODULE_UART_INVERT=1  /  -DRC_CRSF_DISABLE_UART_PROBE=1
    -I$PROJECT_PACKAGES_DIR/framework-arduinopico/pico-sdk/src/rp2_common/hardware_powman/include
build_src_filter = +<rc_crsf_main.cpp> +<bq2562x.cpp> -<main.cpp> -<tx_main.cpp> -<tx_main_bt.cpp> -<tx_main_ble.cpp> -<tx_main_test.cpp> -<tx_main_sx128x.cpp> -<rx_main_sx128x.cpp> -<rx_main_ble.cpp> -<blink.cpp> -<sx1280_debug.cpp>

